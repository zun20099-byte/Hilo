<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Hi-Lo Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f1c40f; --table-green: #1b5e20; }
        body { background: #000; color: white; font-family: 'Kanit', sans-serif; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        /* ส่วนแสดงผลลูกเต๋า */
        .dice-display { background: rgba(0,0,0,0.8); border: 3px solid var(--gold); border-radius: 20px; padding: 20px; margin-bottom: 15px; display: flex; gap: 15px; }
        .die { width: 50px; height: 50px; background: white; color: black; border-radius: 10px; font-size: 32px; font-weight: 800; line-height: 50px; text-align: center; }

        /* กระดานเดิมพัน */
        .bet-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; width: 100%; background: var(--table-green); padding: 10px; border: 6px solid #4d2c12; box-sizing: border-box; }
        .box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); padding: 12px 2px; text-align: center; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .box:hover { background: rgba(255,255,255,0.15); }
        .label { grid-column: span 6; background: rgba(0,0,0,0.4); padding: 6px; color: var(--gold); font-size: 12px; font-weight: bold; margin-top: 5px; }
        
        /* ปุ่มและเงินทุน */
        .control-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #111; border: 2px solid var(--gold); border-top: none; box-sizing: border-box; border-radius: 0 0 15px 15px; }
        .btn-shake { background: linear-gradient(180deg, var(--gold), #b8860b); color: black; border: none; padding: 12px 40px; border-radius: 40px; font-weight: 800; font-size: 22px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="dice-display">
        <div class="die" id="d1">?</div>
        <div class="die" id="d2">?</div>
        <div class="die" id="d3">?</div>
    </div>

    <div class="bet-grid">
        <div class="box" style="grid-column: span 2" onclick="alert('เลือก ต่ำ')"><b>ต่ำ (3-10)</b></div>
        <div class="box" style="grid-column: span 2; background: rgba(139,0,0,0.6);" onclick="alert('เลือก 11 ไฮโล')"><b style="color:var(--gold)">11 ไฮโล</b></div>
        <div class="box" style="grid-column: span 2" onclick="alert('เลือก สูง')"><b>สูง (12-18)</b></div>

        <div class="label">แต้มรวม (SUM)</div>
        <div class="box" onclick="alert('เลือก 4')">4</div><div class="box" onclick="alert('เลือก 5')">5</div><div class="box" onclick="alert('เลือก 6')">6</div>
        <div class="box" onclick="alert('เลือก 7')">7</div><div class="box" onclick="alert('เลือก 8')">8</div><div class="box" onclick="alert('เลือก 9')">9</div>
        <div class="box" onclick="alert('เลือก 10')">10</div><div class="box" onclick="alert('เลือก 12')">12</div><div class="box" onclick="alert('เลือก 13')">13</div>
        <div class="box" onclick="alert('เลือก 14')">14</div><div class="box" onclick="alert('เลือก 15')">15</div><div class="box" onclick="alert('เลือก 16')">16</div>

        <div class="label">เต็งเลข</div>
        <div class="box" onclick="alert('เลือก 1')">1</div><div class="box" onclick="alert('เลือก 2')">2</div><div class="box" onclick="alert('เลือก 3')">3</div>
        <div class="box" onclick="alert('เลือก 4')">4</div><div class="box" onclick="alert('เลือก 5')">5</div><div class="box" onclick="alert('เลือก 6')">6</div>
    </div>

    <div class="control-bar">
        <div id="balance" style="color:#2ecc71; font-size:20px; font-weight:800;">💰 ทุน: 1,000</div>
        <button class="btn-shake" onclick="shake()">เขย่าลูกเต๋า</button>
    </div>
</div>

<script>
    function shake() {
        const d1 = Math.floor(Math.random() * 6) + 1;
        const d2 = Math.floor(Math.random() * 6) + 1;
        const d3 = Math.floor(Math.random() * 6) + 1;
        document.getElementById('d1').innerText = d1;
        document.getElementById('d2').innerText = d2;
        document.getElementById('d3').innerText = d3;
        const sum = d1 + d2 + d3;
        let res = (sum === 11) ? "11 ไฮโล!" : (sum > 11 ? "สูง" : "ต่ำ");
        setTimeout(() => { alert("ผลออก: " + sum + " แต้ม (" + res + ")"); }, 100);
    }
</script>
</body>
</html>
