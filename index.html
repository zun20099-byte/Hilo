<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Hi-Lo Mega VIP (Full Board)</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f1c40f; --table-green: #1b5e20; --lightning: #00d4ff; }
        body { background: #000; color: white; font-family: 'Kanit', sans-serif; margin: 0; display: flex; justify-content: center; }
        .casino-container { width: 100%; max-width: 1180px; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .live-dealer { width: 100%; height: 160px; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1596743444223-9366453982f6?q=80&w=2070') center/cover; border-radius: 15px 15px 0 0; position: relative; border: 3px solid var(--gold); }
        .dice-bowl { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 10px; background: rgba(0,0,0,0.7); padding: 12px; border-radius: 50%; border: 2px solid var(--gold); }
        .die { width: 42px; height: 42px; background: white; color: black; font-size: 28px; line-height: 42px; text-align: center; border-radius: 8px; font-weight: bold; }
        .betting-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 3px; width: 100%; background: var(--table-green); padding: 10px; border: 5px solid #4d2c12; box-sizing: border-box; }
        .bet-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); padding: 10px 2px; text-align: center; cursor: pointer; font-size: 12px; }
        .section-label { grid-column: span 6; background: rgba(0,0,0,0.5); font-size: 11px; padding: 5px; color: var(--gold); text-align: center; margin-top: 5px; }
        .bottom-panel { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #111; border-radius: 0 0 15px 15px; box-sizing: border-box; border: 2px solid var(--gold); border-top: none; }
        .btn-shake { background: linear-gradient(180deg, var(--gold), #b8860b); color: black; border: none; padding: 10px 35px; border-radius: 40px; font-weight: 800; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="casino-container">
    <div class="live-dealer">
        <div class="dice-bowl"><div class="die" id="d1">?</div><div class="die" id="d2">?</div><div class="die" id="d3">?</div></div>
    </div>

    <div class="betting-grid">
        <div class="bet-box" style="grid-column: span 2" onclick="bet('ต่ำ')"><b>ต่ำ (3-10)</b></div>
        <div class="bet-box" style="grid-column: span 2; background: rgba(139,0,0,0.5);" onclick="bet('11 ไฮโล')"><b style="color:var(--gold)">11 ไฮโล</b></div>
        <div class="bet-box" style="grid-column: span 2" onclick="bet('สูง')"><b>สูง (12-18)</b></div>

        <div class="section-label">แต้มรวม (SUM)</div>
        <div class="bet-box" onclick="bet('3')">3</div><div class="bet-box" onclick="bet('4')">4</div><div class="bet-box" onclick="bet('5')">5</div>
        <div class="bet-box" onclick="bet('6')">6</div><div class="bet-box" onclick="bet('7')">7</div><div class="bet-box" onclick="bet('8')">8</div>

        <div class="section-label">เต็งเลข</div>
        <div class="bet-box" onclick="bet('1')">1</div><div class="bet-box" onclick="bet('2')">2</div><div class="bet-box" onclick="bet('3')">3</div>
        <div class="bet-box" onclick="bet('4')">4</div><div class="bet-box" onclick="bet('5')">5</div><div class="bet-box" onclick="bet('6')">6</div>
    </div>

    <div class="bottom-panel">
        <div id="balance" style="color:#2ecc71; font-size:22px; font-weight:bold;">เงินทุน: 1,000</div>
        <button class="btn-shake" onclick="shake()">เขย่าลูกเต๋า</button>
    </div>
</div>

<script>
    function shake() {
        const d1 = Math.floor(Math.random() * 6) + 1;
        const d2 = Math.floor(Math.random() * 6) + 1;
        const d3 = Math.floor(Math.random() * 6) + 1;
        document.getElementById('d1').innerText = d1;
        document.getElementById('d2').innerText = d2;
        document.getElementById('d3').innerText = d3;
        const sum = d1 + d2 + d3;
        let res = (sum === 11) ? "11 ไฮโล!" : (sum > 11 ? "สูง" : "ต่ำ");
        setTimeout(() => { alert("ผลคือ: " + sum + " แต้ม (" + res + ")"); }, 100);
    }
    function bet(type) { alert("คุณเลือก: " + type); }
</script>
</body>
</html>
